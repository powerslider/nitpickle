# NitPickle policy. Per-repo, versioned, human-editable. Read by every skill.
#
# Model: two kinds of checks.
#   commands  Deterministic. NitPickle runs them and ingests output as evidence.
#             Never hand-author a Finding for something a command already reports.
#   rules     Judgment calls a linter cannot make. NitPickle evaluates each and
#             attempts a Proof. If a rule could be a linter analyzer, move it to
#             commands.lint instead.
#
# Severity is set by Proof, not by the rule (see proof.blocking_requires and
# ADR-0001). A rule names what to look for. Whether a violation is blocking
# depends on whether NitPickle can prove it.

version: 1
language: python

# Domain language and decisions NitPickle reads and respects.
# Glossary terms are used verbatim in Findings. Accepted ADRs are not re-litigated.
context:
  glossary: CONTEXT.md       # CONTEXT-MAP.md for multi-context repos
  adr_dir: docs/adr

# Deterministic checks. Output is ingested as evidence.
# This repo is markdown skills plus python tooling, so the checks are the hook
# test suite and the repo consistency validator.
commands:
  test: make test
  lint: make lint

# Judgment rules. NitPickle proves each before flagging it blocking.
rules:
  # structure
  - skill_changes_keep_chain_consistent  # cross-skill references and handoffs stay mutual
  - test_for_each_error_path             # error and edge branches have coverage
  # comments and prose (defined in .nitpickle/preferences.md)
  - comments_what_not_how              # comment intent or invariant, not how it works
  - no_package_comments_unless_asked   # skip package doc comments unless requested
  - no_emdashes_or_semicolons          # in comments and any generated prose
  - no_ai_or_tool_attribution          # no "generated by NitPickle/AI" banners anywhere
  # commits (defined in .nitpickle/preferences.md)
  - commit_conventional_commits        # strict Conventional Commits format
  - commit_footer_resolves_and_signoff # footer: resolves <issue_id> + Signed-off-by from git config

# Files NitPickle must never propose edits to.
generated_files: []

# Optional. Paths whose contents must never be read back or echoed.
# protected_paths:
#   - "**/*.pem"
#   - ".env*"

# Soft limits. NitPickle warns and suggests a split if exceeded, never blocks.
diff_budget:
  max_lines_soft: 300
  max_files_soft: 10

# PR review defaults (used by review-pr).
review:
  default_mode: deep

# Severity gating. blocking requires a runnable Proof. The trust mechanic.
# Do not change without understanding ADR-0001.
proof:
  blocking_requires: [test, repro]
